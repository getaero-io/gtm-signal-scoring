# Routing Rules for Deepline
default_channel: "#deepline-signals"
rep_assignment: "round_robin"

reps:
  - name: "Tej Singh"
    slack_id: "U_TEJ"
    email: "tej@springcash.com"
  - name: "Jai Toor"
    slack_id: "U_JAI"
    email: "jai@springcash.com"

hubspot:
  pipeline_id: "default"  # Replace with actual pipeline ID
  stages:
    qualified: "qualifiedtobuy"      # Stage ID for qualified leads
    nurture: "appointmentscheduled"   # Stage ID for nurture leads
    hot: "decisionmakerboughtin"      # Stage ID for hot leads (score >= 80)
  owner_mapping:
    tej_singh: "HUBSPOT_OWNER_ID_TEJ"   # Replace with actual owner IDs
    jai_toor: "HUBSPOT_OWNER_ID_JAI"

rules:
  - name: "qualified_to_rep"
    conditions:
      - field: "status"
        operator: "equals"
        value: "qualified"
    action: "assign_rep"
    params:
      slack_channel: "#deepline-qualified"
      attio_status: "qualified"

  - name: "nurture_to_campaign"
    conditions:
      - field: "status"
        operator: "equals"
        value: "nurture"
    action: "nurture_campaign"
    params:
      slack_channel: "#deepline-nurture"
      lemlist_campaign: "deepline-nurture"
      attio_status: "nurture"

  - name: "high_score_alert"
    conditions:
      - field: "qualification_score"
        operator: "gte"
        value: 80
    action: "slack_alert"
    params:
      slack_channel: "#deepline-hot-leads"
      message_prefix: "High-score lead detected"
